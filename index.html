<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DrazzeAnonim</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b0618'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%23c77dff'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <main class="app">
    <header class="header">
      <h1>Drazze<span>Anonim</span></h1>
      <p>P2P чат + звонки. Сервер хранит только сигналинг.</p>
    </header>

    <section id="lobby" class="card">
      <label class="field">
        <span>Ваше имя</span>
        <input id="input-name" type="text" placeholder="Гость" maxlength="32" />
      </label>

      <button id="btn-create" class="btn btn-primary" type="button">Создать комнату</button>

      <div class="or">или</div>

      <label class="field">
        <span>ID комнаты</span>
        <input id="input-room" type="text" placeholder="dra..." />
      </label>

      <button id="btn-join" class="btn btn-secondary" type="button">Подключиться</button>
      <p id="lobby-error" class="error" hidden></p>
    </section>

    <section id="chat" class="card hidden">
      <div class="topbar">
        <div class="left">
          <button id="btn-leave" class="btn btn-ghost" type="button">Выйти</button>
          <code id="room-id"></code>
          <span id="status" class="status wait">Ожидание</span>
        </div>
        <div class="right">
          <button id="btn-retry" class="btn btn-ghost hidden" type="button">Повторить</button>
          <button id="btn-copy" class="btn btn-ghost" type="button">Ссылка</button>
          <button id="btn-call" class="btn btn-accent" type="button" disabled>Позвонить</button>
          <button id="btn-hangup" class="btn btn-ghost hidden" type="button">Завершить</button>
        </div>
      </div>

      <p id="room-note" class="hint"></p>

      <div id="messages" class="messages"></div>

      <div id="videos" class="videos hidden">
        <video id="video-local" autoplay muted playsinline></video>
        <video id="video-remote" autoplay playsinline></video>
      </div>

      <form id="send-form" class="composer">
        <input id="input-message" type="text" placeholder="Сообщение" disabled />
        <button id="btn-send" class="btn btn-primary" type="submit" disabled>Отправить</button>
      </form>
    </section>
  </main>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
